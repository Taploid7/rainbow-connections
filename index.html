<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainbow Connections Journey / 彩虹連結之旅</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Rainbow Connections Journey / 彩虹連結之旅</h1>
      <p id="teacher-status">Loading music / 載入音樂中...</p>
    </header>

    <div class="rainbow-container">
      <svg width="400" height="200" viewBox="0 0 400 200">
        <path class="arc" id="arc-0" d="M 50 180 A 150 150 0 0 1 350 180" />
        <path class="arc" id="arc-1" d="M 70 160 A 130 130 0 0 1 330 160" />
        <path class="arc" id="arc-2" d="M 90 140 A 110 110 0 0 1 310 140" />
        <path class="arc" id="arc-3" d="M 110 120 A 90 90 0 0 1 290 120" />
        <path class="arc" id="arc-4" d="M 130 100 A 70 70 0 0 1 270 100" />
      </svg>
    </div>

    <main id="app-content" style="display: none;">
      <div class="card">
        <h2 id="section-title">Part 1 / 第一部分</h2>
        <p id="section-lyrics" class="lyrics-display"></p>
        
        <div class="controls">
          <button id="btn-play" class="btn primary">Play / 播放</button>
          <button id="btn-mic" class="btn secondary">Sing / 唱歌</button>
        </div>
      </div>

      <div class="card">
        <h3>Teacher / 老師</h3>
        <p id="ai-response">Welcome! Press play to listen. / 歡迎！請按下播放。</p>
        <button id="btn-next" class="btn success" disabled>Unlock Next Color / 解鎖下一個顏色</button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
